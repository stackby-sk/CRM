<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh">
  <div class="card p-4" style="width: 400px">
    <h2 class="mb-4 text-center">Login</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input id="email" type="email" class="form-control" formControlName="email" />
        @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
          <div class="text-danger small mt-1">Please enter a valid email</div>
        }
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input id="password" type="password" class="form-control" formControlName="password" />
        @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
          <div class="text-danger small mt-1">Password is required</div>
        }
      </div>

      @if (errorMessage) {
        <div class="alert alert-danger py-2">{{ errorMessage }}</div>
      }

      <button type="submit" class="btn btn-primary w-100" [disabled]="loginForm.invalid">
        Login
      </button>
    </form>

    <p class="text-center mt-3 mb-0">
      <a routerLink="/register">Don't have an account? Register</a>
    </p>
  </div>
</div>
