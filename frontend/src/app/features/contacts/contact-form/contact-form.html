<div class="contact-form-container">
  <h2>{{ isEditMode ? 'Edit Contact' : 'Add Contact' }}</h2>

  <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
    <div class="form-field">
      <label for="customerId">Customer</label>
      <select id="customerId" formControlName="customerId">
        <option value="" disabled>Select a customer</option>
        @for (customer of customers(); track customer.id) {
          <option [value]="customer.id">{{ customer.name }}</option>
        }
      </select>
    </div>

    <div class="form-field">
      <label for="name">Name</label>
      <input id="name" type="text" formControlName="name" />
    </div>

    <div class="form-field">
      <label for="role">Role</label>
      <input id="role" type="text" formControlName="role" placeholder="e.g. Finance Manager" />
    </div>

    <div class="form-field">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" />
    </div>

    <div class="form-field">
      <label for="phone">Phone</label>
      <input id="phone" type="text" formControlName="phone" />
    </div>

    @if (errorMessage()) {
      <div class="error server-error">{{ errorMessage() }}</div>
    }

    <button type="submit" [disabled]="contactForm.invalid">
      {{ isEditMode ? 'Update' : 'Create' }}
    </button>
  </form>
</div>
