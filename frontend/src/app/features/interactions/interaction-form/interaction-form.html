<div class="card p-4" style="max-width: 500px">
  <h2 class="mb-4">Log Interaction</h2>

  <form [formGroup]="interactionForm" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label for="customerId" class="form-label">Customer</label>
      <select id="customerId" class="form-select" formControlName="customerId">
        <option value="" disabled>Select a customer</option>
        @for (customer of customers(); track customer.id) {
          <option [value]="customer.id">{{ customer.name }}</option>
        }
      </select>
    </div>

    <div class="mb-3">
      <label for="type" class="form-label">Type</label>
      <select id="type" class="form-select" formControlName="type">
        @for (type of typeOptions; track type) {
          <option [value]="type">{{ type }}</option>
        }
      </select>
    </div>

    <div class="mb-3">
      <label for="notes" class="form-label">Notes</label>
      <textarea id="notes" class="form-control" formControlName="notes" rows="4"></textarea>
    </div>

    @if (errorMessage()) {
      <div class="alert alert-danger py-2">{{ errorMessage() }}</div>
    }

    <button type="submit" class="btn btn-primary" [disabled]="interactionForm.invalid">
      Log Interaction
    </button>
  </form>
</div>
