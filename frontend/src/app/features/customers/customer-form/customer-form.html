<div class="card p-4" style="max-width: 500px">
  <h2 class="mb-4">{{ isEditMode ? 'Edit Customer' : 'Add Customer' }}</h2>

  <form [formGroup]="customerForm" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label for="name" class="form-label">Name</label>
      <input id="name" type="text" class="form-control" formControlName="name" />
    </div>

    <div class="mb-3">
      <label for="company" class="form-label">Company</label>
      <input id="company" type="text" class="form-control" formControlName="company" />
    </div>

    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input id="email" type="email" class="form-control" formControlName="email" />
      @if (customerForm.get('email')?.invalid && customerForm.get('email')?.touched) {
        <div class="text-danger small mt-1">Please enter a valid email</div>
      }
    </div>

    <div class="mb-3">
      <label for="phone" class="form-label">Phone</label>
      <input id="phone" type="text" class="form-control" formControlName="phone" />
    </div>

    <div class="mb-3">
      <label for="address" class="form-label">Address</label>
      <input id="address" type="text" class="form-control" formControlName="address" />
    </div>

    @if (errorMessage) {
      <div class="alert alert-danger py-2">{{ errorMessage }}</div>
    }

    <button type="submit" class="btn btn-primary" [disabled]="customerForm.invalid">
      {{ isEditMode ? 'Update' : 'Create' }}
    </button>
  </form>
</div>
